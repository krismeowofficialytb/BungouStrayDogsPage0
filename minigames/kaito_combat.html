<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Combat : Kaito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0608;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Rajdhani',sans-serif}
#game-root{width:100%;max-width:800px;height:520px;background:#0a0608;position:relative;overflow:hidden;border-radius:12px}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
#ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}

/* HUD */
#hud{position:absolute;top:12px;left:14px;display:flex;gap:8px;align-items:center}
.heart{font-size:16px}
#phase-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(200,180,180,.7);background:rgba(10,6,8,.75);padding:4px 14px;border-radius:20px;border:1px solid rgba(200,82,74,.25);white-space:nowrap}
#timer-wrap{position:absolute;top:12px;right:80px;display:none;align-items:center;gap:5px}
#timer-num{font-size:20px;font-weight:700;color:#e8d5c4}
#timer-lbl{font-size:9px;letter-spacing:2px;color:rgba(200,180,180,.6);text-transform:uppercase}

/* BOUTON PAUSE */
#pause-btn{position:absolute;top:8px;right:10px;pointer-events:all;width:36px;height:36px;border-radius:8px;background:rgba(10,6,8,.7);border:1px solid rgba(200,82,74,.3);color:#e8d5c4;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:20}
#pause-btn:hover{background:rgba(80,20,20,.6)}

/* PAUSE OVERLAY */
#pause-ov{position:absolute;inset:0;z-index:30;background:rgba(10,6,8,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;pointer-events:all}
#pause-ov h2{font-size:18px;letter-spacing:4px;text-transform:uppercase;color:#e8d5c4;margin-bottom:8px}
.pbtn{padding:10px 30px;border-radius:9px;border:1px solid rgba(200,82,74,.4);background:rgba(40,10,10,.5);color:#e8d5c4;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;width:200px}
.pbtn:hover{background:rgba(120,20,20,.6);border-color:rgba(200,82,74,.8)}
.pbtn.red{color:#ff7070;border-color:rgba(200,40,40,.4)}

/* DASH BTN */
#dash-btn{position:absolute;bottom:16px;right:16px;width:64px;height:64px;border-radius:50%;background:rgba(200,82,74,.18);border:2px solid rgba(200,82,74,.5);color:#e8d5c4;font-size:10px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;pointer-events:all;transition:all .2s;text-align:center;line-height:1.2}
#dash-btn:hover{background:rgba(200,82,74,.35)}
#dash-btn.hidden{display:none}

/* OVERLAY PRINCIPAL */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(10,6,8,.95);pointer-events:all;z-index:10}
#overlay.hide{display:none}
.ol-tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(200,82,74,.85)}
.ol-title{font-size:clamp(1rem,2.8vw,1.5rem);color:#e8d5c4;letter-spacing:.06em;text-align:center;max-width:480px;font-weight:600}
.ol-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.ol-btn{padding:10px 26px;border-radius:9px;border:1px solid rgba(200,82,74,.4);background:rgba(60,15,15,.5);color:#e8d5c4;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif}
.ol-btn:hover{background:rgba(120,20,20,.6);border-color:rgba(200,82,74,.8)}
.ol-btn.primary{background:rgba(200,82,74,.25);border-color:rgba(200,82,74,.7)}
.ol-btn.primary:hover{background:rgba(200,82,74,.5)}

/* SÉLECTION PERSONNAGES */
.char-pick{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.cpick{width:130px;padding:14px 10px;border-radius:12px;border:1px solid rgba(200,82,74,.25);background:rgba(25,8,8,.7);color:#e8d5c4;cursor:pointer;text-align:center;transition:all .22s}
.cpick:hover,.cpick.sel{border-color:rgba(200,82,74,.75);background:rgba(70,15,15,.55)}
.cpick-name{font-size:15px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.cpick-tag{font-size:11px;color:rgba(200,150,120,.75);margin-top:8px;line-height:1.5;font-style:italic}
.stat-row{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:10px;color:rgba(200,180,180,.6);letter-spacing:1px;text-transform:uppercase}
.stat-bar{flex:1;height:3px;background:rgba(200,82,74,.15);border-radius:2px;overflow:hidden}
.stat-fill{height:100%;background:linear-gradient(90deg,#7a2a2a,#c8524a);border-radius:2px}
</style>
</head>
<body>
<div id="game-root">
  <canvas id="gc"></canvas>
  <div id="ui">
    <div id="hud">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3" style="display:none">❤️</span>
    </div>
    <div id="phase-bar">Phase 1 — Esquive</div>
    <div id="timer-wrap">
      <div id="timer-num">10</div>
      <div id="timer-lbl">sec</div>
    </div>
    <button id="pause-btn" onclick="togglePause()">⏸</button>
    <div id="dash-btn" class="hidden" onclick="triggerDash()">
      <span style="font-size:15px">⚡</span>
      <span>Course</span>
    </div>
  </div>

  <!-- PAUSE OVERLAY -->
  <div id="pause-ov">
    <h2>Pause</h2>
    <button class="pbtn" onclick="togglePause()">▶ Reprendre</button>
    <button class="pbtn red" onclick="goMenu()">🏠 Menu principal</button>
  </div>

  <!-- OVERLAY SELECTION / FIN -->
  <div id="overlay">
    <div class="ol-tag">✦ Combat — Kaito</div>
    <div class="ol-title">Qui choisiras-tu pour combattre Kaito ?</div>
    <div class="char-pick">
      <div class="cpick" data-char="dazai">
        <div class="cpick-name">Dazai</div>
        <div class="stat-row">Vitesse<div class="stat-bar"><div class="stat-fill" style="width:88%"></div></div></div>
        <div class="stat-row">Vie<div class="stat-bar"><div class="stat-fill" style="width:28%"></div></div></div>
        <div class="cpick-tag">Très rapide — 1 vie</div>
      </div>
      <div class="cpick" data-char="kunikida">
        <div class="cpick-name">Kunikida</div>
        <div class="stat-row">Vitesse<div class="stat-bar"><div class="stat-fill" style="width:52%"></div></div></div>
        <div class="stat-row">Vie<div class="stat-bar"><div class="stat-fill" style="width:85%"></div></div></div>
        <div class="cpick-tag">Solide — 3 vies</div>
      </div>
    </div>
    <div class="ol-btns">
      <button class="ol-btn primary" id="start-btn" style="opacity:.35;pointer-events:none">▶ Commencer</button>
    </div>
  </div>
</div>

<script>
(function(){
  const C    = document.getElementById('gc');
  const ctx  = C.getContext('2d');
  const root = document.getElementById('game-root');
  const overlay   = document.getElementById('overlay');
  const dashBtn   = document.getElementById('dash-btn');
  const phaseBar  = document.getElementById('phase-bar');
  const timerWrap = document.getElementById('timer-wrap');
  const timerNum  = document.getElementById('timer-num');
  const pauseOv   = document.getElementById('pause-ov');

  /* ── MUSIQUE PROPRE ── */
  const bgm = new Audio('music/kaito_fight.mp3');
  bgm.loop   = true;
  bgm.volume = 0.55;

  function startMusic() {
    // Stop la musique éventuelle du parent (game.html)
    try {
      if (window.parent && window.parent !== window) {
        const pm = window.parent.document.getElementById('music');
        if (pm) { pm.pause(); pm.currentTime = 0; }
      }
    } catch(e){}
    bgm.currentTime = 0;
    bgm.play().catch(()=>{});
  }
  function stopMusic() {
    bgm.pause();
    bgm.currentTime = 0;
  }

  /* ── RESIZE ── */
  let W, H;
  let selectedChar = null, maxLives = 2, lives = 2;
  let phase = 1, running = false, paused = false;
  let playerX, playerY, playerW = 42, playerH = 52;
  let targetX, targetY;
  let filaments = [];
  let kaitoX, kaitoY = 70, kaitoW = 48, kaitoH = 58;
  let waveTimer = 0, waveInterval = 90, wavePattern = 0;
  let invincible = false, invTimer = 0;
  let timerSec = 10, timerMs = 0;
  let chargeTriggered = false;
  let screenShake = 0;
  let particles = [];
  let tick = 0;
  let raf = null;
  let lastTime = 0;

  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if(w<2*r)r=w/2; if(h<2*r)r=h/2;
      this.moveTo(x+r,y); this.lineTo(x+w-r,y);
      this.quadraticCurveTo(x+w,y,x+w,y+r); this.lineTo(x+w,y+h-r);
      this.quadraticCurveTo(x+w,y+h,x+w-r,y+h); this.lineTo(x+r,y+h);
      this.quadraticCurveTo(x,y+h,x,y+h-r); this.lineTo(x,y+r);
      this.quadraticCurveTo(x,y,x+r,y); return this;
    };
  }

  function resize(){
    const rect = root.getBoundingClientRect();
    W = rect.width; H = rect.height;
    C.width = W; C.height = H;
    playerX = W/2; playerY = H-80;
    targetX = playerX; targetY = playerY;
    kaitoX  = W/2;
  }
  window.addEventListener('resize', ()=>{ resize(); });
  resize();

  /* ── SELECTION PERSO ── */
  document.querySelectorAll('.cpick').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedChar = el.getAttribute('data-char');
      document.querySelectorAll('.cpick').forEach(c=>c.classList.remove('sel'));
      el.classList.add('sel');
      const btn = document.getElementById('start-btn');
      btn.style.opacity = '1'; btn.style.pointerEvents = 'all';
      maxLives = selectedChar === 'kunikida' ? 3 : 1;
      lives = maxLives; updateHUD();
    });
  });

  function updateHUD(){
    document.getElementById('h1').textContent = lives>=1?'❤️':'🖤';
    document.getElementById('h2').textContent = lives>=2?'❤️':'🖤';
    if(maxLives>=3){
      document.getElementById('h3').style.display='inline';
      document.getElementById('h3').textContent = lives>=3?'❤️':'🖤';
    } else {
      document.getElementById('h3').style.display='none';
    }
  }

  /* ── PAUSE ── */
  function togglePause(){
    if(!running) return;
    paused = !paused;
    pauseOv.style.display = paused ? 'flex' : 'none';
    document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';
    if(!paused){ lastTime=0; raf=requestAnimationFrame(loop); }
    else { cancelAnimationFrame(raf); }
  }
  window.togglePause = togglePause;

  function goMenu(){
    stopMusic();
    if(window.parent && window.parent.postMessage){
      window.parent.postMessage({type:'otome_goto', scene:'menu'},'*');
    } else {
      window.location.href = '../index.html';
    }
  }
  window.goMenu = goMenu;

  /* ── DÉMARRAGE ── */
  function startGame(){
    if(!selectedChar) return;
    overlay.classList.add('hide');
    running = true; paused = false;
    phase = 1; lives = maxLives;
    filaments=[]; particles=[]; screenShake=0;
    chargeTriggered=false; waveTimer=0; wavePattern=0; waveInterval=90;
    timerSec=10; timerMs=0; tick=0;
    playerX=W/2; playerY=H-80;
    targetX=playerX; targetY=playerY;
    kaitoX=W/2; kaitoY=70;
    updateHUD();
    dashBtn.classList.remove('hidden');
    phaseBar.textContent = 'Phase 1 — Esquive';
    timerWrap.style.display = 'none';
    startMusic();
    if(raf) cancelAnimationFrame(raf);
    lastTime=0;
    raf = requestAnimationFrame(loop);
  }

  function triggerDash(){
    if(!running||chargeTriggered||phase!==1||paused) return;
    dashBtn.classList.add('hidden');
    chargeTriggered=true;
    setTimeout(()=>startPhase2(), 400);
  }
  window.triggerDash = triggerDash;

  function startPhase2(){
    phase=2;
    phaseBar.textContent='Phase 2 — Course vers Kaito';
    timerWrap.style.display='flex';
    timerNum.textContent=timerSec;
    timerMs=0;
    targetY=H-80; playerY=H-80;
  }

  /* ── SPAWN VAGUE ── */
  function spawnWave(){
    const spd = 1.8 + (wavePattern*0.25) + (phase===2?1.2:0);
    const p = wavePattern%5;
    if(p===0){
      for(let i=0;i<4;i++)
        filaments.push({x:-18,y:H*(0.5+Math.random()*0.42),dx:spd+Math.random()*0.4,dy:(Math.random()-.5)*0.4,w:20,h:4,r:0,mem:false});
    } else if(p===1){
      for(let i=0;i<5;i++)
        filaments.push({x:W*(i/4.5),y:-18,dx:(Math.random()-.5)*0.3,dy:spd,w:4,h:20,r:0,mem:false});
    } else if(p===2){
      filaments.push({x:-18,y:H*0.55,dx:spd+0.4,dy:spd*0.55,w:22,h:4,r:0.35,mem:false});
      filaments.push({x:W+18,y:H*0.55,dx:-spd-0.4,dy:spd*0.55,w:22,h:4,r:-0.35,mem:false});
      filaments.push({x:W/2,y:-18,dx:0,dy:spd+0.4,w:4,h:22,r:0,mem:false});
    } else if(p===3){
      for(let i=0;i<3;i++){
        const ang=Math.random()*Math.PI*2;
        filaments.push({x:kaitoX,y:kaitoY+38,dx:Math.cos(ang)*(spd+0.8),dy:Math.sin(ang)*(spd+0.8)+0.4,w:16,h:4,r:ang,mem:false});
      }
    } else {
      filaments.push({x:kaitoX,y:kaitoY+38,dx:(Math.random()-.5)*2.5,dy:spd+Math.random()*1.2,w:15,h:4,r:0,mem:true});
    }
    if(phase===2){
      for(let i=0;i<2;i++){
        const side=Math.floor(Math.random()*3);
        let fx,fy,fdx,fdy;
        if(side===0){fx=Math.random()*W;fy=-18;fdx=(Math.random()-.5);fdy=spd+0.8;}
        else if(side===1){fx=-18;fy=Math.random()*H*0.7;fdx=spd+0.8;fdy=(Math.random()-.5);}
        else{fx=W+18;fy=Math.random()*H*0.7;fdx=-spd-0.8;fdy=(Math.random()-.5);}
        filaments.push({x:fx,y:fy,dx:fdx,dy:fdy,w:16,h:4,r:0,mem:Math.random()>0.65});
      }
    }
    wavePattern++;
  }

  function hitTest(f){
    if(invincible) return false;
    const px=playerX-playerW/2, py=playerY-playerH/2;
    const fx=f.x-f.w/2,      fy=f.y-f.h/2;
    return(px<fx+f.w&&px+playerW>fx&&py<fy+f.h&&py+playerH>fy);
  }

  function takeHit(){
    if(invincible) return;
    lives--; updateHUD();
    invincible=true; invTimer=60;
    screenShake=10;
    for(let i=0;i<6;i++)
      particles.push({x:playerX,y:playerY,dx:(Math.random()-.5)*3.5,dy:-Math.random()*2.5-0.8,life:28,maxLife:28,r:Math.random()*5+2,col:'rgba(200,82,74,0.9)'});
    if(lives<=0) endFight();
  }

  function endFight(){
    running=false;
    dashBtn.classList.add('hidden');
    timerWrap.style.display='none';
    cancelAnimationFrame(raf);
    stopMusic();
    showEndScreen();
  }

  function showEndScreen(){
    overlay.classList.remove('hide');
    overlay.innerHTML=`
      <div class="ol-tag">✦ Combat terminé</div>
      <div class="ol-title" style="font-style:italic;max-width:420px;line-height:1.5">
        Dazai et Kunikida s'effondrent.<br>Kaito efface leur mémoire.
      </div>
      <div class="ol-btns" style="margin-top:18px">
        <button class="ol-btn" onclick="restartFromEnd()">↺ Rejouer</button>
        <button class="ol-btn primary" onclick="continueStory()">Continuer ▶</button>
      </div>
    `;
  }

  window.restartFromEnd = function(){
    overlay.innerHTML='';
    overlay.classList.add('hide');
    // Réinitialise et repart sur l'écran de sélection
    location.reload();
  };

  window.continueStory = function(){
    stopMusic();
    if(window.parent&&window.parent.postMessage){
      window.parent.postMessage({type:'otome_goto',scene:'c1_s72'},'*');
    }
  };

  /* ── CONTRÔLES ── */
  let mouseDown=false;
  root.addEventListener('touchstart',(e)=>{
    if(!running||paused) return;
    const t=e.touches[0], rect=root.getBoundingClientRect();
    targetX=Math.max(24,Math.min(W-24,t.clientX-rect.left));
    targetY=Math.max(phase===1?H/2:40,Math.min(H-30,t.clientY-rect.top));
    e.preventDefault();
  },{passive:false});
  root.addEventListener('touchmove',(e)=>{
    if(!running||paused) return;
    const t=e.touches[0], rect=root.getBoundingClientRect();
    targetX=Math.max(24,Math.min(W-24,t.clientX-rect.left));
    targetY=Math.max(phase===1?H/2:40,Math.min(H-30,t.clientY-rect.top));
    e.preventDefault();
  },{passive:false});
  root.addEventListener('mousedown',(e)=>{
    mouseDown=true;
    if(!running||paused) return;
    const rect=root.getBoundingClientRect();
    targetX=Math.max(24,Math.min(W-24,e.clientX-rect.left));
    targetY=Math.max(phase===1?H/2:40,Math.min(H-30,e.clientY-rect.top));
  });
  window.addEventListener('mouseup',()=>{ mouseDown=false; });
  root.addEventListener('mousemove',(e)=>{
    if(!running||!mouseDown||paused) return;
    const rect=root.getBoundingClientRect();
    targetX=Math.max(24,Math.min(W-24,e.clientX-rect.left));
    targetY=Math.max(phase===1?H/2:40,Math.min(H-30,e.clientY-rect.top));
  });

  /* ── DESSIN ── */
  function drawBg(){
    ctx.fillStyle='#0c080b';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(200,82,74,0.035)';
    ctx.lineWidth=1;
    for(let y=0;y<H;y+=28){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
  }

  function drawKaito(){
    const gy=Math.sin(tick*0.04)*3;
    const cy=kaitoY+gy;
    // Aura — dégradé radial au lieu de shadowBlur
    const grad=ctx.createRadialGradient(kaitoX,cy+kaitoH/2,0,kaitoX,cy+kaitoH/2,kaitoW*1.1);
    grad.addColorStop(0,'rgba(160,90,200,0.22)');
    grad.addColorStop(1,'rgba(160,90,200,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.ellipse(kaitoX,cy+kaitoH/2,kaitoW,kaitoH*0.6,0,0,Math.PI*2);
    ctx.fill();
    // Corps
    ctx.fillStyle='rgba(215,195,255,0.88)';
    ctx.beginPath();
    ctx.roundRect(kaitoX-21,cy-kaitoH/2,42,kaitoH,7);
    ctx.fill();
    // Label
    ctx.fillStyle='rgba(25,8,38,0.75)';
    ctx.font='bold 10px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('KAITO',kaitoX,cy+4);
    // Orbites
    for(let i=0;i<3;i++){
      const a=tick*0.05+i*Math.PI*0.66;
      const r=kaitoW*0.85+Math.sin(tick*0.08+i)*4;
      ctx.strokeStyle=`rgba(180,100,220,${0.35+0.15*Math.sin(tick*0.1+i)})`;
      ctx.lineWidth=1.2;
      ctx.beginPath();
      ctx.arc(kaitoX,cy,r,a,a+Math.PI*0.5);
      ctx.stroke();
    }
  }

  function drawFilament(f){
    ctx.save();
    ctx.translate(f.x,f.y); ctx.rotate(f.r);
    ctx.fillStyle=f.mem?'rgba(200,140,255,0.82)':'rgba(175,195,195,0.68)';
    ctx.fillRect(-f.w/2,-f.h/2,f.w,f.h);
    ctx.restore();
  }

  function drawPlayer(){
    ctx.save();
    ctx.globalAlpha=(invincible&&Math.floor(tick/4)%2===0)?0.28:1;
    const col=selectedChar==='dazai'?'rgba(200,180,140,0.9)':'rgba(130,175,200,0.9)';
    // Lueur légère via radial gradient au lieu de shadowBlur
    const glow=ctx.createRadialGradient(playerX,playerY,0,playerX,playerY,playerW);
    glow.addColorStop(0,selectedChar==='dazai'?'rgba(200,150,80,0.18)':'rgba(80,150,200,0.18)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;
    ctx.beginPath();
    ctx.ellipse(playerX,playerY,playerW,playerH/2,0,0,Math.PI*2);
    ctx.fill();
    // Corps
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.roundRect(playerX-playerW/2,playerY-playerH/2,playerW,playerH,7);
    ctx.fill();
    // Label
    ctx.fillStyle='rgba(10,6,8,0.7)';
    ctx.font='bold 8px sans-serif';
    ctx.textAlign='center';
    ctx.fillText((selectedChar==='dazai'?'DAZ':'KUN'),playerX,playerY+3);
    ctx.globalAlpha=1;
    ctx.restore();
  }

  /* ── LOOP (cap 60fps) ── */
  function loop(ts){
    if(!running||paused) return;
    // Cap 60fps
    if(ts-lastTime<15.5){ raf=requestAnimationFrame(loop); return; }
    lastTime=ts;
    tick++;
    ctx.clearRect(0,0,W,H);

    let sx=0,sy=0;
    if(screenShake>0.5){
      sx=(Math.random()-.5)*screenShake;
      sy=(Math.random()-.5)*screenShake;
      screenShake*=0.72;
    }
    ctx.save();
    if(sx||sy) ctx.translate(sx,sy);

    drawBg();
    drawKaito();

    waveTimer++;
    if(waveTimer>=waveInterval){ waveTimer=0; spawnWave(); }
    if(waveInterval>42) waveInterval=Math.max(42,90-wavePattern*2.5);

    filaments=filaments.filter(f=>{
      f.x+=f.dx; f.y+=f.dy;
      if(f.x<-60||f.x>W+60||f.y<-60||f.y>H+60) return false;
      drawFilament(f);
      if(hitTest(f)) takeHit();
      return true;
    });

    if(phase===2){
      timerMs+=1000/60;
      const secLeft=Math.max(0,timerSec-Math.floor(timerMs/1000));
      timerNum.textContent=secLeft;
      if(timerMs>=timerSec*1000){ endFight(); return; }
      // Victoire si le joueur touche Kaito
      const dist=Math.hypot(playerX-kaitoX,playerY-(kaitoY+kaitoH/2));
      if(dist<32){ endFight(); return; }
    }

    const spd=selectedChar==='dazai'?0.27:0.21;
    playerX+=(targetX-playerX)*spd;
    playerY+=(targetY-playerY)*spd;

    if(invincible){ invTimer--; if(invTimer<=0) invincible=false; }

    // Particules
    particles=particles.filter(p=>{
      p.x+=p.dx; p.y+=p.dy; p.dy+=0.12; p.life--;
      ctx.globalAlpha=p.life/p.maxLife*0.75;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      return p.life>0;
    });

    drawPlayer();
    ctx.restore();
    raf=requestAnimationFrame(loop);
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
})();
</script>
